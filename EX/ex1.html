<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>가정용 꿀사과</title>
  <link rel="stylesheet" href="ex1.css">
</head>
<body>

<div class="wrap">

  <header class="head">
    <h1>가정용 꿀사과</h1>
    <p class="head-memo">
      흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다.<br>
      질좋은 사과를 저렴하게 즐겨보세요
    </p>
  </header>

  <div class="headsub">
    확인하세요.
  </div>

  <section class="inside">

    <h2>주문 및 배송</h2>

    <p class="bold">
      <span class="blue">오후 2시 이전</span> 주문건은 당일 발송합니다
    </p>

    <p class="bold">
      2시 이후 주문건은 다음날 발송합니다 (주말 제외)
    </p>

    <h2>교환 및 환불</h2>

    <p class="bold">
      불만즉시 <span class="blue">100% 환불</span>해 드립니다
    </p>

    <p>고객센터로 전화주세요</p>

  </section>

  <section class="inside-bottom">

    <h2>고객센터</h2>

    <p class="tel">0000-0000</p>

    <p class="customer">
      상담시간: 오전9시 ~ 오후 6시(토/일, 공휴일 휴무)
    </p>

  </section>

</div>

</body>
</html>
